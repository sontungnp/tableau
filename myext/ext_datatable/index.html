<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>AG Grid - Hiệu năng hiển thị dữ liệu lớn</title>

    <!-- AG Grid Community -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

    <script src="../../lib/tableau.extensions.1.latest.js"></script>
    <script src="script.js"></script>

    <!-- ===== -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f5f6fa;
      }

      .container {
        display: flex;
        flex-direction: column;
        height: 100%;
        /* padding: 10px; */
      }

      /* === TOOLBAR === */
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 2px;
        gap: 5px;
      }

      /* Phần tìm kiếm bên trái */
      .toolbar-left {
        display: flex;
        align-items: center;
        flex: 1; /* chiếm hết khoảng trống còn lại */
      }

      .search-container {
        display: flex;
        align-items: center;
        width: 100%;
        /* max-width: 600px; */
        background-color: white;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 1px 2px;
      }

      .search-container span {
        margin-right: 6px;
        font-size: 14px;
        color: #555;
      }

      .search-container input {
        flex: 1;
        border: none;
        outline: none;
        padding: 3px;
        font-size: 14px;
        background: transparent;
      }

      /* Phần nút bên phải */
      .toolbar-right {
        display: flex;
        align-items: center;
        gap: 3px;
        margin-left: 30px;
      }

      .extract-time {
        font-size: 13px;
      }

      .toolbar-right button {
        padding: 3px 4px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background-color: #fff;
        cursor: pointer;
      }

      .toolbar-right button:hover {
        background-color: #f0f0f0;
      }

      /* === GRID === */
      #myGrid {
        height: 530px;
        width: 100%;
      }

      .footer {
        position: sticky;
        bottom: 0;
        background-color: #f0f0f0;
        font-weight: bold;
        border-top: 2px solid #ccc;
        padding: 8px;
        text-align: right;
      }

      /* === DÒNG TỔNG === */
      .ag-row-pinned {
        font-weight: bold !important;
        background-color: #f0f0f0 !important;
      }

      /* === XEN KẼ DÒNG === */
      .ag-row:nth-child(even) {
        background-color: #f9f9f9;
      }

      .ag-row:nth-child(odd) {
        background-color: #ffffff;
      }

      /* Cho phép chọn text */
      .ag-cell {
        user-select: text !important;
        -webkit-user-select: text !important;
        -moz-user-select: text !important;
      }

      /* chỉnh màu nền header */
      /* === HEADER TABLE === */
      .ag-theme-alpine .ag-header,
      .ag-theme-alpine .ag-header-cell {
        background-color: #c4e1f1 !important;
      }

      .ag-theme-alpine .ag-header-cell-text {
        font-weight: bold;
        color: #000;
      }

      /* Thêm css cho nut filter */
      #notebar {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-end; /* bám đáy */
      }
      #filter-area {
        margin-top: 2px;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        align-items: center;
      }

      #filter-area button {
        padding: 2px 2px;
        margin: 2px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #eef6ff;
        cursor: pointer;
        font-size: 11px;
        color: #333;
        line-height: 1.2;
        transition: all 0.2s ease;
      }

      #filter-area button:hover {
        background: #d9ecff;
      }

      /* .ag-header-cell {
        padding-left: 4px !important; 
        padding-right: 4px !important;
        width: 30px !important;
      } */

      /* .ag-cell {
        padding-left: 4px !important;
        padding-right: 4px !important;
        width: 30px !important;
      } */

      /* .ag-column-first {
        width: 30px !important;
      } */

      /* .ag-header-cell {
        width: 30px !important;
      } */
    </style>
  </head>

  <body>
    <div class="container">
      <div class="toolbar">
        <!-- Bên trái: ô tìm kiếm -->
        <div class="toolbar-left">
          <div class="search-container">
            <span>🔍</span>
            <input type="text" id="searchBox" placeholder="Tìm kiếm..." />
          </div>
        </div>

        <!-- Bên phải: các nút chỉ hiển thị icon -->
        <div class="toolbar-right">
          <div class="extract-time">
            <label id="extractRefreshTime">extract refresh time: </label>
          </div>
          <button
            id="clearAllFilterBtn"
            title="Clear All Filter"
            style="display: none"
          >
            🚫
          </button>
          <button id="exportBtn" title="Export Excel">
            <i class="fas fa-file-export"></i>
          </button>
          <button id="copyCellBtn" title="Copy selected cell">⎘</button>
          <button id="copyBtn" title="Copy selected rows">
            <i class="fas fa-copy"></i>
          </button>
          <button id="updateTotal" title="Update Total" style="display: none">
            <i class="fas fa-redo"></i>
          </button>
        </div>
      </div>

      <!-- <div id="notebar" style="text-align: right">

        > -->

            UpdateTotal
          </button> -->

        <label id="extractRefreshTime">extract refresh time: </label>

      <div id="myGrid" class="ag-theme-alpine"></div>
    </div>
  </body>
</html>
